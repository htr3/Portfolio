<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animated Hand-Drawn Timeline — Particle Burst</title>

<!-- Google Handwritten Font -->
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #0d0d0d;
        overflow-x: hidden;
        font-family: 'Permanent Marker', cursive;
        color: white;
    }

    /* Moving Grid Background */
    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 300%;
        height: 300%;
        background-image: 
            linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 60px 60px;
        animation: moveGrid 20s linear infinite;
        z-index: -2;
    }

    @keyframes moveGrid {
        from { transform: translate(0, 0); }
        to { transform: translate(-60px, -60px); }
    }

    /* Canvas for Particles */
    #bgCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* keep visually behind the timeline */
        display: block;
    }

    /* Timeline Container */
    .timeline-container {
        position: relative;
        width: 100%;
        height: 200vh;
        padding: 100px 0;
        z-index: 0;
    }

    svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }

    /* Timeline Path */
    .timeline-path {
        fill: none;
        stroke: red;
        stroke-width: 6px;
        filter: url(#rough);
        animation: wiggle 3s infinite ease-in-out;
    }

    @keyframes wiggle {
        0%, 100% { stroke-width: 6px; }
        50% { stroke-width: 7.5px; }
    }

    /* Points */
    .timeline-point {
        fill: red;
        stroke: white;
        stroke-width: 2px;
        r: 10;
        filter: drop-shadow(0 0 8px red);
    }

    /* Labels */
    .label {
        fill: none;
        stroke: white;
        stroke-width: 1.5px;
        font-size: 1.5rem;
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: none;
    }

    .label.animate {
        animation: drawText 2s ease forwards;
    }

    @keyframes drawText {
        to { stroke-dashoffset: 0; }
    }

    /* small instruction */
    .hint {
        position: fixed;
        right: 12px;
        bottom: 12px;
        background: rgba(255,255,255,0.06);
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 0.9rem;
        z-index: 2;
        backdrop-filter: blur(4px);
    }

#fightersCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -0; /* above bg particles (-1), still behind timeline (default 1) */
    pointer-events: none;
}

.popup {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}
.popup.hidden {
    display: none;
}
.popup-content {
    background: #111;
    color: white;
    padding: 20px 30px;
    border-radius: 12px;
    max-width: 400px;
    box-shadow: 0 0 20px rgba(255,0,0,0.7);
    font-family: 'Permanent Marker', cursive;
    text-align: center;
    animation: popupFade 0.3s ease-out;
}
.popup-content h2 {
    margin: 0 0 10px;
    color: #ff4444;
}
#popup-close {
    position: absolute;
    top: 15px;
    right: 25px;
    font-size: 24px;
    cursor: pointer;
    color: white;
}
@keyframes popupFade {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}


</style>
</head>
<body>



<!-- Particle Canvas -->
<canvas id="bgCanvas"></canvas>

    <!-- Fighters Canvas -->
<canvas id="fightersCanvas"></canvas>

<div class="hint">Click near a red particle to burst it ✨</div>

<!-- Timeline -->
<div class="timeline-container">
    <svg id="timeline-svg">
        <defs>
            <!-- Rough Hand-Drawn Filter -->
            <filter id="rough">
                <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
            </filter>
        </defs>

        <!-- Timeline Path -->
<path id="timeline-path" class="timeline-path"
      d="M 100 100
         C 200 50, 400 250, 500 200
         S 800 350, 900 500
         S 1200 650, 1300 900
         S 1600 1150, 1800 1000
         L 1800 1100" />


    </svg>
</div>

<!-- Popup Box -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <span id="popup-close">&times;</span>
    <h2 id="popup-title"></h2>
    <p id="popup-text"></p>
  </div>
</div>


<script>
// Timeline Stages (labels only, no coordinates)
const stages = [
{ x: 100,  y: 100,  label: "Beginning", text: "This is where it all started — the very first step." },
    { x: 300,  y: 200,  label: "Bachelor Degree", text: "Pursued a Bachelor's degree, laying the foundation." },
    { x: 500,  y: 0,    label: "Projects", text: "Worked on exciting projects, gaining real skills." },
    { x: 700,  y: 150,  label: "Master", text: "Advanced studies to specialize further." },
    { x: 1100, y: 300,  label: "Job", text: "Entered the professional world with my first job." },
    { x: 1700, y: 400,  label: "More Projects", text: "Kept learning and building through more projects." }
    
];

const svg = document.getElementById("timeline-svg");
const path = document.getElementById("timeline-path");
const pathLength = path.getTotalLength();

// Place points and labels evenly along the path
stages.forEach((stage, i) => {
    const t = i / (stages.length - 1); // normalized position along path
    const pt = path.getPointAtLength(pathLength * t);

    let point = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    point.setAttribute("class", "timeline-point");
    point.setAttribute("cx", pt.x);
    point.setAttribute("cy", pt.y);
    point.setAttribute("r", "10");
    svg.appendChild(point);
    // inside stages.forEach(stage => { ... })
    point.addEventListener("click", () => {
        showPopup(stage.label, stage.text);
    });

    let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", pt.x + 20);
    text.setAttribute("y", pt.y - 10);
    text.setAttribute("class", "label");
    text.textContent = stage.label;
    svg.appendChild(text);
});

// Animate Labels on Scroll (unchanged)
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("animate");
        } else {
            entry.target.classList.remove("animate");
        }
    });
}, { threshold: 0.5 });

document.querySelectorAll(".label").forEach(label => {
    observer.observe(label);
});

// -------- Floating Particle Background with Click-to-Burst --------
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");
let particles = [];
const INITIAL_COUNT = 60;
const MAX_PARTICLES = 600;

function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    // Scale drawing operations to CSS pixels
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function createParticle(x = Math.random() * window.innerWidth, y = Math.random() * window.innerHeight, r = Math.random() * 3 + 1, type = 'float'){
    const speed = type === 'float' ? ((Math.random()-0.5)*0.6) : ((Math.random()-0.5)*4);
    return {
        x,
        y,
        r,
        dx: speed,
        dy: (Math.random()-0.5) * (type === 'float' ? 0.6 : 4),
        type, // 'float' or 'burst'
        life: type === 'float' ? Infinity : 60, // burst lives ~60 frames
        maxLife: type === 'float' ? Infinity : 60,
    };
}

// initial floating particles
for (let i = 0; i < INITIAL_COUNT; i++) particles.push(createParticle());

const particleColors = ["red", "cyan", "lime", "orange", "magenta", "yellow"];
let currentColorIndex = 0;
let currentColor = particleColors[currentColorIndex];

// change color every 10 seconds
setInterval(() => {
    currentColorIndex = (currentColorIndex + 1) % particleColors.length;
    currentColor = particleColors[currentColorIndex];
}, 10000);


function drawParticles(){
    // clear in CSS pixels
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.fillStyle = currentColor; 

        particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.shadowBlur = 10;
        ctx.shadowColor = currentColor;
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    // draw each particle
    for (let i = particles.length - 1; i >= 0; i--){
        const p = particles[i];

        // life / fade handling for burst particles
        let alpha = 1;
        if (p.type === 'burst'){
            alpha = Math.max(0, p.life / p.maxLife);
            p.life--;
            // slight damping so burst slows
            p.dx *= 0.98;
            p.dy *= 0.98;
            if (p.life <= 0){
                particles.splice(i, 1);
                continue;
            }
        }

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.2, p.r), 0, Math.PI * 2);
        ctx.shadowBlur = p.type === 'float' ? 10 : 6;
        ctx.shadowColor = "red";
        ctx.fillStyle = "rgba(255, 0, 0, 0.9)";
        ctx.fill();
        ctx.restore();

        p.x += p.dx;
        p.y += p.dy;

        // keep floaters gently inside bounds by bouncing
        if (p.type === 'float'){
            if (p.x < 0) { p.x = 0; p.dx *= -1; }
            if (p.x > window.innerWidth) { p.x = window.innerWidth; p.dx *= -1; }
            if (p.y < 0) { p.y = 0; p.dy *= -1; }
            if (p.y > window.innerHeight) { p.y = window.innerHeight; p.dy *= -1; }
        }
    }

    // limit total particles to avoid buildup
    if (particles.length > MAX_PARTICLES){
        // remove oldest burst particles first
        particles = particles.filter(p => p.type === 'float').concat(particles.filter(p => p.type !== 'float')).slice(0, MAX_PARTICLES);
    }

    requestAnimationFrame(drawParticles);
}

drawParticles();

// Click-to-burst: listen on window so clicks reach even when canvas is visually behind other elements
window.addEventListener('click', (e) => {
    const mouseX = e.clientX;
    const mouseY = e.clientY;

    // find nearest float particle within a threshold
    let nearestIndex = -1;
    let nearestDist = Infinity;
    for (let i = 0; i < particles.length; i++){
        const p = particles[i];
        if (p.type !== 'float') continue;
        const d = Math.hypot(p.x - mouseX, p.y - mouseY);
        if (d < nearestDist){
            nearestDist = d;
            nearestIndex = i;
        }
    }

    const CLICK_THRESHOLD = 30; // px — how near a particle must be to trigger burst

    if (nearestIndex !== -1 && nearestDist <= CLICK_THRESHOLD){
        const p = particles.splice(nearestIndex, 1)[0]; // remove that particle
        createBurst(p.x, p.y, 10 + Math.floor(Math.random()*8));
    } else {
        // If no particle nearby, still create a small burst at click so user sees effect
        createBurst(mouseX, mouseY, 6);
    }
});

function createBurst(x, y, count = 10){
    for (let i = 0; i < count; i++){
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3;
        const dx = Math.cos(angle) * speed;
        const dy = Math.sin(angle) * speed;
        particles.push({
            x: x,
            y: y,
            r: Math.random() * 1.6 + 0.4,
            dx: dx,
            dy: dy,
            type: 'burst',
            life: 40 + Math.floor(Math.random() * 30),
            maxLife: 40 + Math.floor(Math.random() * 30)
        });
    }
}

// ...existing code...

// -------- Rough Sketched Fighters --------
const fightersCanvas = document.getElementById("fightersCanvas");
const fctx = fightersCanvas.getContext("2d");

function resizeFightersCanvas(){
    const dpr = window.devicePixelRatio || 1;
    fightersCanvas.width = window.innerWidth * dpr;
    fightersCanvas.height = window.innerHeight * dpr;
    fightersCanvas.style.width = window.innerWidth + "px";
    fightersCanvas.style.height = window.innerHeight + "px";
    fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resizeFightersCanvas);
resizeFightersCanvas();

function scribbleLine(ctx, x1, y1, x2, y2, scratch = 4){
    for (let i = 0; i < scratch; i++){
        const jitter = 4;
        ctx.beginPath();
        ctx.moveTo(x1 + (Math.random()*jitter - jitter/2), y1 + (Math.random()*jitter - jitter/2));
        ctx.lineTo(x2 + (Math.random()*jitter - jitter/2), y2 + (Math.random()*jitter - jitter/2));
        ctx.stroke();
    }
}

// Define poses for hand-sketched fighters
const poses = [
    // 0: left punch
    { arms: [ [-50, 10], [20, 10] ], legs: [ [-25, 50], [25, 50] ] },
    // 1: right punch
    { arms: [ [50, 10], [-20, 10] ], legs: [ [-25, 50], [25, 50] ] },
    // 2: high kick left
    { arms: [ [-20, 0], [20, 0] ], legs: [ [-25, 80], [25, 30] ] },
    // 3: duck/dodge
    { arms: [ [-20, 10], [20, 10] ], legs: [ [-25, 40], [25, 40] ], bodyDip: 20 }
];

function drawFighter(ctx, x, y, scale = 1, poseIdx = 0, flip = false){
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 2;
    ctx.shadowColor = "white";
    ctx.shadowBlur = 8;

    if (flip) {
        ctx.translate(x, 0);
        ctx.scale(-1, 1);
        x = 0;
    }

    const pose = poses[poseIdx % poses.length];
    const headR = 20 * scale;
    const bodyH = 60 * scale;
    const dip = pose.bodyDip ? pose.bodyDip * scale : 0;

    // head
    ctx.beginPath();
    ctx.arc(x, y - bodyH - headR + dip, headR, 0, Math.PI*2);
    ctx.stroke();

    // body
    scribbleLine(ctx, x, y - headR + dip, x, y - bodyH - headR + dip);

    // arms
    scribbleLine(ctx, x, y - bodyH + dip, x + pose.arms[0][0]*scale, y - bodyH + pose.arms[0][1]*scale + dip);
    scribbleLine(ctx, x, y - bodyH + dip, x + pose.arms[1][0]*scale, y - bodyH + pose.arms[1][1]*scale + dip);

    // legs
    scribbleLine(ctx, x, y + dip, x + pose.legs[0][0]*scale, y + pose.legs[0][1]*scale + dip);
    scribbleLine(ctx, x, y + dip, x + pose.legs[1][0]*scale, y + pose.legs[1][1]*scale + dip);

    ctx.restore();
}

// --- Movement logic for chasing ---
let fightFrame = 0;

// Initial positions
let runner = {
    x: window.innerWidth * 0.7,
    y: window.innerHeight / 2 + 40,
    vx: 1.2,
    vy: 0
};
let chaser = {
    x: window.innerWidth * 0.3,
    y: window.innerHeight / 2 + 40,
    vx: 1.5,
    vy: 0
};

let catchCooldown = 0; // frames to wait after a catch

function animateFighters(){
    fctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    // Animate pose index
    const poseL = Math.floor(fightFrame/30) % poses.length;
    const poseR = (poseL + 2) % poses.length;

    // Move runner (moves right, bounces at edge)
    runner.x += runner.vx;
    if (runner.x > window.innerWidth - 100 || runner.x < 100) {
        runner.vx *= -1;
    }

    // Chaser moves toward runner, unless in cooldown
    let dx = runner.x - chaser.x;
    let dy = runner.y - chaser.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (catchCooldown > 0) {
        catchCooldown--;
    } else if (dist < 40) {
        // On catch: runner escapes, chaser pauses
        runner.vx *= -1;
        chaser.x -= (dx / dist) * 40; // push chaser back more
        catchCooldown = 40; // pause chasing for 40 frames
    } else {
        chaser.x += (dx / dist) * chaser.vx;
        chaser.y += (dy / dist) * chaser.vx;
    }

    // Draw chaser (left), facing right
    drawFighter(fctx, chaser.x, chaser.y, 1.0, poseL, false);
    // Draw runner (right), facing left
    drawFighter(fctx, runner.x, runner.y, 1.0, poseR, true);

    fightFrame++;
    requestAnimationFrame(animateFighters);
}
animateFighters();


// ...existing code...

// -------- Hand-Drawn Racing Cars --------
const carColors = ["#00eaff", "#ffea00"];
const carCrashColor = "#ff3c3c";
let car1 = {
    x: 120,
    y: window.innerHeight - 120,
    vx: 2.2,
    color: carColors[0],
    crashTimer: 0
};
let car2 = {
    x: window.innerWidth - 120,
    y: window.innerHeight - 180,
    vx: -2.4,
    color: carColors[1],
    crashTimer: 0
};

function drawHandCar(ctx, x, y, color, scale=1, flip=false) {
    ctx.save();
    ctx.lineWidth = 2;
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.translate(x, y);
    if (flip) ctx.scale(-1, 1);

    // Body
    ctx.beginPath();
    ctx.moveTo(-30*scale, 0);
    ctx.lineTo(30*scale, 0);
    ctx.lineTo(25*scale, -15*scale);
    ctx.lineTo(-25*scale, -15*scale);
    ctx.closePath();
    ctx.stroke();

    // Roof
    ctx.beginPath();
    ctx.moveTo(-15*scale, -15*scale);
    ctx.lineTo(-10*scale, -30*scale);
    ctx.lineTo(10*scale, -30*scale);
    ctx.lineTo(15*scale, -15*scale);
    ctx.stroke();

    // Wheels
    for (let wx of [-18, 18]) {
        ctx.beginPath();
        ctx.arc(wx*scale, 8*scale, 6*scale, 0, Math.PI*2);
        ctx.stroke();
    }
    ctx.restore();
}

function animateCars() {
    // Move cars
    car1.x += car1.vx;
    car2.x += car2.vx;

    // Bounce at screen edges
    if (car1.x > window.innerWidth - 60 || car1.x < 60) car1.vx *= -1;
    if (car2.x > window.innerWidth - 60 || car2.x < 60) car2.vx *= -1;

    // Collision detection
    let dx = car1.x - car2.x;
    let dy = car1.y - car2.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 60 && car1.crashTimer === 0 && car2.crashTimer === 0) {
        car1.crashTimer = car2.crashTimer = 40; // frames to show crash color
    }

    // Handle crash color
    car1.color = car1.crashTimer > 0 ? carCrashColor : carColors[0];
    car2.color = car2.crashTimer > 0 ? carCrashColor : carColors[1];
    if (car1.crashTimer > 0) car1.crashTimer--;
    if (car2.crashTimer > 0) car2.crashTimer--;

    // Draw cars (on fightersCanvas for simplicity)
    fctx.save();
    fctx.globalAlpha = 0.95;
    drawHandCar(fctx, car1.x, car1.y, car1.color, 0.7, car1.vx < 0);
    drawHandCar(fctx, car2.x, car2.y, car2.color, 0.7, car2.vx < 0);
    fctx.restore();

    requestAnimationFrame(animateCars);
}
animateCars();

// ...existing code...

// -------- Firecracker Animation --------
const firecrackerColors = [
    "#ff3c3c", "#ffe100", "#00ffea", "#ff00e1", "#00ff4c", "#ff8c00", "#ffffff"
];

let firecrackers = [];

function launchFirecracker() {
    // Launch from random x at bottom
    const x = 80 + Math.random() * (window.innerWidth - 160);
    const y = window.innerHeight + 10;
    const targetY = 100 + Math.random() * (window.innerHeight * 0.4);
    const color = firecrackerColors[Math.floor(Math.random() * firecrackerColors.length)];
    firecrackers.push({
        x, y,
        vx: 0,
        vy: -6 - Math.random() * 2,
        color,
        exploded: false,
        targetY,
        sparks: []
    });
}

function animateFirecrackers() {
    // Occasionally launch a new firecracker
    if (Math.random() < 0.025) launchFirecracker();

    // Draw and update firecrackers
    for (let i = firecrackers.length - 1; i >= 0; i--) {
        let fc = firecrackers[i];
        if (!fc.exploded) {
            // Move up
            fc.y += fc.vy;
            // Draw trail
            fctx.save();
            fctx.globalAlpha = 0.7;
            fctx.strokeStyle = fc.color;
            fctx.lineWidth = 2;
            fctx.beginPath();
            fctx.moveTo(fc.x, fc.y);
            fctx.lineTo(fc.x, fc.y + 18);
            fctx.stroke();
            fctx.restore();

            // Explode at target height
            if (fc.y <= fc.targetY) {
                fc.exploded = true;
                // Create sparks
                for (let j = 0; j < 24; j++) {
                    const angle = (Math.PI * 2 * j) / 24;
                    const speed = 2 + Math.random() * 2.5;
                    fc.sparks.push({
                        x: fc.x,
                        y: fc.y,
                        dx: Math.cos(angle) * speed,
                        dy: Math.sin(angle) * speed,
                        color: firecrackerColors[Math.floor(Math.random() * firecrackerColors.length)],
                        life: 36 + Math.random() * 12
                    });
                }
            }
        } else {
            // Animate sparks
            let alive = false;
            for (let spark of fc.sparks) {
                if (spark.life > 0) {
                    alive = true;
                    spark.x += spark.dx;
                    spark.y += spark.dy;
                    spark.dy += 0.04; // gravity
                    spark.dx *= 0.98;
                    spark.dy *= 0.98;
                    spark.life--;

                    fctx.save();
                    fctx.globalAlpha = Math.max(0, spark.life / 40);
                    fctx.beginPath();
                    fctx.arc(spark.x, spark.y, 2.2, 0, Math.PI * 2);
                    fctx.fillStyle = spark.color;
                    fctx.shadowBlur = 10;
                    fctx.shadowColor = spark.color;
                    fctx.fill();
                    fctx.restore();
                }
            }
            if (!alive) {
                firecrackers.splice(i, 1);
            }
        }
    }
    requestAnimationFrame(animateFirecrackers);
}
animateFirecrackers();

// --- Popup Logic ---
const popup = document.getElementById("popup");
const popupTitle = document.getElementById("popup-title");
const popupText = document.getElementById("popup-text");
const popupClose = document.getElementById("popup-close");

function showPopup(title, text){
    popupTitle.textContent = title;
    popupText.textContent = text;
    popup.classList.remove("hidden");
}
popupClose.addEventListener("click", () => popup.classList.add("hidden"));
popup.addEventListener("click", e => {
    if (e.target === popup) popup.classList.add("hidden");
});

</script>

</body>
</html>
